name: Tests-workflow

on:
  workflow_call:
  push:
    branches: 
      - 'dev'
    paths:
      - 'src/**'
      - 'public/**'

jobs:
  tests:
    name: Testing
    runs-on: ubuntu-latest
    steps: 
      - uses: actions/checkout@v6
      - uses: ./.github/actions/checkout-repo-setup-node
      - name: Tests
        run: npm run test
