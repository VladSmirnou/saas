name: Lint-Format-TS-workflow

on:
  workflow_call:

jobs:
  lint-format-ts:
    name: Linting & Formatting & TS
    runs-on: ubuntu-latest
    steps: 
      - uses: actions/checkout@v6
      - uses: ./.github/actions/checkout-repo-setup-node
      - name: Call related npm script
        run: npm run lint-format-ts
